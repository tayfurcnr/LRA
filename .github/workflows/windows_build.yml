name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PySide6 vtk numpy fpdf2 ezdxf pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller --clean PipeLRAStudio.spec

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PipeLRAStudio-Windows
        path: dist/PipeLRAStudio.exe
